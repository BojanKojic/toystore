<div class="agent-wrapper">

  @if (otvoren) {
    <div class="agent-prozor">
      <div class="agent-header">
        <span>🤖 Igor — Asistent</span>
        <button mat-icon-button (click)="toggleAgent()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="agent-poruke">
        @for (poruka of poruke; track $index) {
          <div [class]="'poruka ' + poruka.odKoga">
            <span>{{ poruka.tekst }}</span>
          </div>
        }
      </div>

      <div class="agent-unos">
        <mat-form-field appearance="outline" class="unos-polje">
          <input matInput [(ngModel)]="unos"
                 (keyup.enter)="posalji()"
                 placeholder="Unesite poruku...">
        </mat-form-field>
        <button mat-icon-button color="primary" (click)="posalji()">
          <mat-icon>send</mat-icon>
        </button>
      </div>
    </div>
  }

  <button mat-fab color="primary" class="agent-dugme" (click)="toggleAgent()">
    <mat-icon>smart_toy</mat-icon>
  </button>

</div>
