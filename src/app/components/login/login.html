<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>🔐 Prijava</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (greska) {
        <p class="greska">{{ greska }}</p>
      }

      <mat-form-field appearance="outline" class="puno-sirine">
        <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="email" type="email" placeholder="marko@email.com">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="puno-sirine">
        <mat-label>Lozinka</mat-label>
        <input matInput [(ngModel)]="lozinka" type="password">
        <mat-icon matSuffix>lock</mat-icon>
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="prijavi()">
        <mat-icon>login</mat-icon> Prijavi se
      </button>
      <button mat-button routerLink="/registracija">
        Nemate nalog? Registrujte se
      </button>
    </mat-card-actions>
  </mat-card>
</div>
